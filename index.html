<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Names</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Nunito', sans-serif; }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.6) translateY(10px); }
      70% { transform: scale(1.05) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-30px) scale(1.05); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-15px,25px) scale(0.95); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(10px,-20px); } }
    .blob1 { animation: float1 8s ease-in-out infinite; }
    .blob2 { animation: float2 11s ease-in-out infinite; }
    .blob3 { animation: float3 9s ease-in-out infinite; }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(123,97,255,0.25) !important; }
    input::placeholder { color: #BDB5E8; }
    .dark input::placeholder { color: #333; }
    button:active { transform: scale(0.96) !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // Light mode: vivid, modern jewel tones with good contrast
    const LIGHT_COLORS = [
      "#7B61FF","#FF5FA0","#00C2A8","#FF8C42","#4ECDC4",
      "#A855F7","#F43F5E","#06B6D4","#F59E0B","#10B981",
      "#8B5CF6","#EC4899","#14B8A6","#FB923C","#22D3EE",
      "#6366F1","#E11D48","#0EA5E9","#D97706","#059669"
    ];

    // Dark mode: same hues but slightly brighter/more neon
    const DARK_COLORS = [
      "#9D87FF","#FF7AB8","#00DFC2","#FFA266","#6EE7E0",
      "#C084FC","#FB6680","#38BDF8","#FBB540","#34D399",
      "#A78BFA","#F472B6","#2DD4BF","#FDBA74","#67E8F9",
      "#818CF8","#FB4570","#38BDF8","#FCD34D","#6EE7B7"
    ];

    const SPIN_FREQS = [523, 587, 659, 784, 880];

    function useAudio() {
      const ctxRef = useRef(null);
      const getCtx = () => {
        if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return ctxRef.current;
      };
      const playTick = useCallback(() => {
        try {
          const ctx = getCtx();
          const o = ctx.createOscillator(); const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = SPIN_FREQS[Math.floor(Math.random() * SPIN_FREQS.length)];
          o.type = "sine";
          g.gain.setValueAtTime(0.1, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
          o.start(); o.stop(ctx.currentTime + 0.1);
        } catch(e) {}
      }, []);
      const playWin = useCallback(() => {
        try {
          const ctx = getCtx();
          [523,659,784,1047].forEach((freq, i) => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = freq; o.type = "triangle";
            const t = ctx.currentTime + i * 0.13;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.14, t + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
            o.start(t); o.stop(t + 0.5);
          });
        } catch(e) {}
      }, []);
      return { playTick, playWin };
    }

    function WheelCanvas({ names, colors, rotation, dark }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        const cx = W/2, cy = H/2;
        const r = Math.min(W,H)/2 - 6;
        ctx.clearRect(0, 0, W, H);

        if (names.length === 0) {
          // Empty state ring
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
          ctx.fillStyle = dark ? "#16161F" : "#F0EEFF";
          ctx.fill();
          ctx.strokeStyle = dark ? "rgba(123,97,255,0.2)" : "rgba(123,97,255,0.15)";
          ctx.lineWidth = 2; ctx.setLineDash([8,6]);
          ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle = dark ? "#333" : "#C4BBF0";
          ctx.font = "700 13px Nunito, sans-serif";
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("Add names below", cx, cy);
          return;
        }

        const slice = (2*Math.PI) / names.length;
        names.forEach((name, i) => {
          const start = rotation + i * slice;
          const end = start + slice;
          const mid = start + slice/2;

          ctx.beginPath(); ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, start, end); ctx.closePath();
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();
          ctx.strokeStyle = dark ? "rgba(10,10,18,0.5)" : "rgba(255,255,255,0.6)";
          ctx.lineWidth = 2; ctx.stroke();

          ctx.save(); ctx.translate(cx, cy); ctx.rotate(mid);
          ctx.textAlign = "right";
          ctx.fillStyle = "#fff";
          const fontSize = Math.max(9, Math.min(14, 190 / names.length));
          ctx.font = `800 ${fontSize}px Nunito, sans-serif`;
          ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 4;
          const label = name.length > 13 ? name.slice(0,12)+"…" : name;
          ctx.fillText(label, r - 12, fontSize/3);
          ctx.restore();
        });

        // Center cap
        const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,20);
        cg.addColorStop(0, dark ? "#A78BFA" : "#9D87FF");
        cg.addColorStop(1, dark ? "#7C3AED" : "#7B61FF");
        ctx.beginPath(); ctx.arc(cx,cy,20,0,2*Math.PI);
        ctx.fillStyle = cg; ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,6,0,2*Math.PI);
        ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.fill();
      }, [names, colors, rotation, dark]);
      return <canvas ref={canvasRef} width={360} height={360} style={{display:"block",margin:"0 auto"}} />;
    }

    function App() {
      const [names, setNames] = useState([]);
      const [newName, setNewName] = useState("");
      const [spinning, setSpinning] = useState(false);
      const [rotation, setRotation] = useState(0);
      const [winner, setWinner] = useState(null);
      const [showWinner, setShowWinner] = useState(false);
      const [history, setHistory] = useState([]);
      const [tab, setTab] = useState("wheel");
      const [dark, setDark] = useState(false);
      const rotRef = useRef(0);
      const animRef = useRef(null);
      const inputRef = useRef(null);
      const { playTick, playWin } = useAudio();

      const COLORS = dark ? DARK_COLORS : LIGHT_COLORS;

      const spin = useCallback(() => {
        if (spinning || names.length < 2) return;
        setWinner(null); setShowWinner(false); setSpinning(true);
        const totalRot = (Math.random()*6+8)*2*Math.PI;
        const duration = 4500 + Math.random()*800;
        const startRot = rotRef.current;
        const startTime = performance.now();
        let lastTick = 0;
        const ease = t => 1 - Math.pow(1-t, 3);
        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed/duration, 1);
          const currentRot = startRot + totalRot * ease(progress);
          rotRef.current = currentRot; setRotation(currentRot);
          const speed = 1 - progress;
          if (now - lastTick > 55 + (1-speed)*420) { playTick(); lastTick = now; }
          if (progress < 1) { animRef.current = requestAnimationFrame(animate); }
          else {
            setSpinning(false);
            const slice = (2*Math.PI)/names.length;
            const norm = ((currentRot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
            const idx = Math.floor(((2*Math.PI-norm)%(2*Math.PI))/slice)%names.length;
            const w = names[idx];
            setWinner(w); setShowWinner(true); playWin();
            setHistory(h => [{
              winner: w, participants:[...names],
              date: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})+" · "+
                    new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})
            }, ...h.slice(0,49)]);
          }
        };
        animRef.current = requestAnimationFrame(animate);
      }, [spinning, names, playTick, playWin]);

      const addName = () => {
        const t = newName.trim();
        if (!t || names.includes(t) || names.length >= 20) return;
        setNames(n => [...n, t]); setNewName("");
        inputRef.current?.focus();
      };
      const removeName = name => setNames(n => n.filter(x => x !== name));

      // Theme
      const T = dark ? {
        bg:"#0D0D16", surface:"#14141E", surfaceHover:"#1C1C2A",
        border:"rgba(123,97,255,0.2)", borderStrong:"rgba(123,97,255,0.4)",
        text:"#EEE9FF", textMuted:"#6B6B8A", textLight:"#3A3A52",
        inputBg:"#14141E", inputBorder:"rgba(123,97,255,0.25)",
        badge: (c) => ({ bg: c+"25", border: c+"50", text: c }),
        btnGrad:"linear-gradient(135deg,#7B61FF 0%,#C850C0 55%,#FF5FA0 100%)",
        btnGlow:"0 4px 24px rgba(123,97,255,0.45)",
        btnDisabled:"#1C1C2A", btnDisabledText:"#3A3A52",
        tabActiveBg:"linear-gradient(135deg,#7B61FF,#C850C0)",
        tabInactiveText:"#3A3A52",
        winnerGrad:"linear-gradient(135deg,#9D87FF,#F472B6,#FF7AB8)",
        pointer:"#FF5FA0", pointerGlow:"rgba(255,95,160,0.6)",
        headerBg:"rgba(13,13,22,0.92)", headerBorder:"rgba(123,97,255,0.15)",
        histBg:"#14141E", histBorder:"rgba(123,97,255,0.15)",
        logoGrad:"linear-gradient(135deg,#9D87FF,#F472B6)",
        toggleBg:"#1C1C2A", toggleText:"#9D87FF",
        sparkle:"#7B61FF",
      } : {
        bg:"#F5F3FF", surface:"#FFFFFF", surfaceHover:"#FAF8FF",
        border:"rgba(123,97,255,0.15)", borderStrong:"rgba(123,97,255,0.35)",
        text:"#1E1548", textMuted:"#8B7FBF", textLight:"#C4BBF0",
        inputBg:"#FFFFFF", inputBorder:"rgba(123,97,255,0.25)",
        badge: (c) => ({ bg: c+"18", border: c+"40", text: c }),
        btnGrad:"linear-gradient(135deg,#7B61FF 0%,#B957D5 55%,#FF5FA0 100%)",
        btnGlow:"0 4px 24px rgba(123,97,255,0.35)",
        btnDisabled:"#EDE9FF", btnDisabledText:"#C4BBF0",
        tabActiveBg:"linear-gradient(135deg,#7B61FF,#B957D5)",
        tabInactiveText:"#C4BBF0",
        winnerGrad:"linear-gradient(135deg,#7B61FF,#B957D5,#FF5FA0)",
        pointer:"#FF5FA0", pointerGlow:"rgba(255,95,160,0.5)",
        headerBg:"rgba(245,243,255,0.92)", headerBorder:"rgba(123,97,255,0.12)",
        histBg:"#FFFFFF", histBorder:"rgba(123,97,255,0.12)",
        logoGrad:"linear-gradient(135deg,#7B61FF,#FF5FA0)",
        toggleBg:"#EDE9FF", toggleText:"#7B61FF",
        sparkle:"#A78BFA",
      };

      const canSpin = names.length >= 2 && !spinning;

      return (
        <div className={dark?"dark":""} style={{minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'Nunito',sans-serif", transition:"background 0.35s,color 0.35s"}}>

          {/* Floating blobs */}
          <div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
            {dark ? (
              <>
                <div className="blob1" style={{position:"absolute",top:-80,right:-60,width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(123,97,255,0.12),transparent 70%)"}}/>
                <div className="blob2" style={{position:"absolute",bottom:60,left:-80,width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(200,80,192,0.1),transparent 70%)"}}/>
              </>
            ) : (
              <>
                <div className="blob1" style={{position:"absolute",top:-60,right:-40,width:320,height:320,borderRadius:"60% 40% 55% 45%",background:"radial-gradient(circle,#E0D9FF,#F0EEFF 60%,transparent)",opacity:0.8}}/>
                <div className="blob2" style={{position:"absolute",top:160,left:-80,width:280,height:280,borderRadius:"45% 55% 40% 60%",background:"radial-gradient(circle,#FFD6EC,#FFF0F7 60%,transparent)",opacity:0.7}}/>
                <div className="blob3" style={{position:"absolute",bottom:20,right:60,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,#D0F4FF,#E8FEFF 60%,transparent)",opacity:0.6}}/>
              </>
            )}
          </div>

          {/* Header */}
          <header style={{position:"sticky",top:0,zIndex:100,height:58,padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:T.headerBg,borderBottom:`1px solid ${T.headerBorder}`,backdropFilter:"blur(12px)"}}>
            <div style={{fontSize:16,fontWeight:900,letterSpacing:"0.04em",background:T.logoGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              🎡 Wheel of Names
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {[["wheel","Spin"],["history","History"]].map(([v,label])=>(
                <button key={v} onClick={()=>setTab(v)} style={{padding:"5px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,letterSpacing:"0.07em",fontFamily:"inherit",background:tab===v?T.tabActiveBg:"transparent",color:tab===v?"#fff":T.tabInactiveText,transition:"all 0.2s"}}>
                  {label}
                </button>
              ))}
              <button onClick={()=>setDark(d=>!d)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${T.border}`,background:T.toggleBg,color:T.toggleText,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,transition:"all 0.2s"}}>
                {dark?"☀️ Light":"🌙 Dark"}
              </button>
            </div>
          </header>

          {/* WHEEL TAB */}
          {tab==="wheel" && (
            <main style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 56px",gap:18}}>

              {/* Wheel */}
              <div style={{position:"relative",filter:`drop-shadow(0 12px 32px ${dark?"rgba(123,97,255,0.35)":"rgba(123,97,255,0.2)"})`,transition:"filter 0.3s"}}>
                {/* Pointer */}
                <div style={{position:"absolute",top:"50%",right:-16,transform:"translateY(-50%)",zIndex:10}}>
                  <div style={{width:0,height:0,borderTop:"13px solid transparent",borderBottom:"13px solid transparent",borderRight:`28px solid ${T.pointer}`,filter:`drop-shadow(0 0 8px ${T.pointerGlow})`}}/>
                </div>
                <WheelCanvas key={dark?"dark":"light"} names={names} colors={COLORS} rotation={rotation} dark={dark}/>
              </div>

              {/* Spin button */}
              <button onClick={spin} disabled={!canSpin} style={{padding:"13px 50px",borderRadius:50,border:"none",cursor:canSpin?"pointer":"not-allowed",fontSize:13,fontWeight:900,letterSpacing:"0.14em",fontFamily:"inherit",background:canSpin?T.btnGrad:T.btnDisabled,color:canSpin?"#fff":T.btnDisabledText,boxShadow:canSpin?T.btnGlow:"none",transition:"all 0.3s",transform:spinning?"scale(0.97)":"scale(1)"}}>
                {spinning?"SPINNING...":"✦ SPIN THE WHEEL ✦"}
              </button>

              {/* Winner */}
              {showWinner && winner && (
                <div style={{textAlign:"center",animation:"popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}>
                  <div style={{fontSize:10,letterSpacing:"0.28em",color:T.textMuted,marginBottom:8,fontWeight:800}}>✦ WINNER ✦</div>
                  <div style={{fontSize:"clamp(19px,5vw,27px)",fontWeight:900,padding:"13px 34px",borderRadius:50,border:`2px solid ${dark?"rgba(200,80,192,0.35)":"rgba(123,97,255,0.25)"}`,background:T.winnerGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"0.03em",boxShadow:dark?"0 0 40px rgba(123,97,255,0.15)":"0 4px 20px rgba(123,97,255,0.12)"}}>
                    🎉 {winner} 🎉
                  </div>
                </div>
              )}

              {/* Input */}
              <div style={{display:"flex",gap:8,width:"100%",maxWidth:360}}>
                <input ref={inputRef} value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addName()} placeholder="Type a name and press Enter..." style={{flex:1,padding:"11px 18px",borderRadius:50,background:T.inputBg,border:`1.5px solid ${T.inputBorder}`,color:T.text,fontFamily:"inherit",fontSize:13,fontWeight:600,transition:"border 0.2s,box-shadow 0.2s"}}/>
                <button onClick={addName} disabled={names.length>=20} style={{padding:"11px 18px",borderRadius:50,border:"none",background:T.btnGrad,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:900,boxShadow:T.btnGlow,flexShrink:0}}>+</button>
              </div>

              {/* Name tags */}
              {names.length>0 && (
                <div style={{display:"flex",flexWrap:"wrap",gap:7,justifyContent:"center",maxWidth:440}}>
                  {names.map((name,i)=>{
                    const c=COLORS[i%COLORS.length];
                    const b=T.badge(c);
                    return(
                      <div key={name} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px 5px 12px",borderRadius:20,background:b.bg,border:`1.5px solid ${b.border}`,fontSize:12,fontWeight:700,cursor:"default"}}>
                        <span style={{color:b.text}}>{name}</span>
                        <button onClick={()=>removeName(name)} style={{background:"none",border:"none",cursor:"pointer",color:dark?"#3A3A52":"#C4BBF0",fontSize:15,padding:"0 0 0 2px",lineHeight:1,fontWeight:900}}>×</button>
                      </div>
                    );
                  })}
                </div>
              )}

              {names.length===0 && (
                <p style={{fontSize:12,color:T.textMuted,fontWeight:600,letterSpacing:"0.04em"}}>Add at least 2 names to spin</p>
              )}
              {names.length>=20 && (
                <p style={{fontSize:11,color:T.textMuted,fontWeight:700,letterSpacing:"0.08em"}}>✦ MAX 20 NAMES</p>
              )}
            </main>
          )}

          {/* HISTORY TAB */}
          {tab==="history" && (
            <main style={{position:"relative",zIndex:1,padding:"28px 20px",maxWidth:500,margin:"0 auto",width:"100%"}}>
              <p style={{fontSize:10,letterSpacing:"0.25em",color:T.textMuted,marginBottom:20,fontWeight:800}}>✦ DRAW HISTORY</p>
              {history.length===0 ? (
                <div style={{color:T.textLight,fontSize:14,textAlign:"center",marginTop:80,fontWeight:700}}>
                  No draws yet<br/><span style={{fontSize:11,display:"block",marginTop:6,fontWeight:400,color:T.textMuted}}>Spin the wheel to get started</span>
                </div>
              ) : history.map((h,i)=>(
                <div key={i} style={{background:T.histBg,border:`1.5px solid ${T.histBorder}`,borderRadius:16,padding:"15px 18px",marginBottom:9,boxShadow:dark?"none":"0 2px 12px rgba(123,97,255,0.07)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:900,background:T.winnerGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🎉 {h.winner}</div>
                      <div style={{fontSize:11,color:T.textMuted,marginTop:5,lineHeight:1.9,fontWeight:600}}>{h.participants.join(" · ")}</div>
                    </div>
                    <div style={{fontSize:10,color:T.textLight,flexShrink:0,fontWeight:700,letterSpacing:"0.04em"}}>{h.date}</div>
                  </div>
                </div>
              ))}
            </main>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
